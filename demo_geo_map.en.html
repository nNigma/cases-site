<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline-location map - demo (synthetic data)</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <style>
      html, body {
        margin: 0;
        background: #0a0f1f;
        color: rgba(255, 255, 255, 0.9);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .wrap { padding: 10px 12px 4px; }
      .cap { color: rgba(255, 255, 255, 0.55); font-size: 12px; margin: 2px 2px 8px; }
      #map { width: 100%; height: 560px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="cap">
        Synthetic data. Blue dots - existing pickup points; large yellow - candidate districts for new
        openings (population density and routes). OpenStreetMap tiles, no tokens.
      </div>
      <div id="map"></div>
    </div>
    <script>
      const existLat = [55.78,55.77,55.76,55.75,55.74,55.73,55.79,55.76,55.72,55.75,55.77,55.70,55.81,55.74,55.78,55.71,55.73,55.80,55.69,55.76,55.74,55.82,55.68,55.75];
      const existLon = [37.55,37.60,37.64,37.58,37.62,37.68,37.62,37.70,37.59,37.66,37.53,37.63,37.59,37.55,37.68,37.66,37.51,37.66,37.58,37.49,37.72,37.64,37.62,37.74];
      const candLat = [55.83,55.70,55.67,55.84,55.79,55.71];
      const candLon = [37.55,37.50,37.70,37.70,37.76,37.74];
      const candName = ["C-1","C-2","C-3","C-4","C-5","C-6"];

      const pvz = {
        type: "scattermapbox", lat: existLat, lon: existLon, mode: "markers", name: "Existing pickup points",
        marker: { size: 9, color: "#60a5fa", opacity: 0.85 }, hovertemplate: "pickup point<extra></extra>"
      };
      const cand = {
        type: "scattermapbox", lat: candLat, lon: candLon, mode: "markers+text", name: "Candidates",
        text: candName, textposition: "top right", textfont: { color: "#fbbf24", size: 11 },
        marker: { size: 16, color: "#fbbf24", opacity: 0.95 }, hovertemplate: "%{text} · candidate<extra></extra>"
      };

      const layout = {
        paper_bgcolor: "#0a0f1f", font: { color: "rgba(255,255,255,0.8)" },
        margin: { l: 0, r: 0, t: 0, b: 0 },
        legend: { x: 0, y: 1, bgcolor: "rgba(10,15,31,0.6)", font: { color: "#fff" } },
        mapbox: { style: "open-street-map", center: { lat: 55.751, lon: 37.618 }, zoom: 9.6 }
      };

      Plotly.newPlot("map", [pvz, cand], layout, { displayModeBar: false, responsive: true });
    </script>
  </body>
</html>
